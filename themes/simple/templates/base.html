<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
		<meta http-equiv="X-UA-Compatible" content="IE=edge" />
		<title>{% block title %}{{ SITENAME }}{% endblock %}</title>
		<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" integrity="sha256-2FMn2Zx6PuH5tdBQDRNwrOo60ts5wWPC9R8jK67b3t4=" crossorigin="anonymous">
		<link rel="stylesheet" href="{{ SITEURL }}/theme/css/style.css" />
	</head>
	<body>
		<div class="container">
			<div class="row">
				<div class="col-10">
					<header>
						<h1><a href="{{ SITEURL }}">{{ SITENAME }}</a></h1>
						<p>{{ SITESUBTITLE }}</p>
					</header>
				</div>
			</div>
		</div>

		<!--
		<div class="container">
			<div class="row">
				<div class="col-10">
					<nav>
						<a href="{{ SITEURL }}">Home</a>
					</nav>
				</div>
			</div>
		</div>
	  -->

		<div class="container">
			<div class="row">
				<div class="col-10">
					<main>{% block content %}{% endblock %}</main>
				</div>
			</div>
		</div>

		<div class="container">
			<div class="row">
				<div class="col-10">
					<footer>
						<p><small>&copy; {{ CURRENT_YEAR }} <a href="{{ SITEURL }}">{{ SITENAME }}</a>.
						Built with <a href="https://getpelican.com/">Pelican</a> and <a href="https://getbootstrap.com/">Bootstrap</a>.</small></p>
					</footer>
				</div>
			</div>
		</div>
		<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
	</body>
</html>
